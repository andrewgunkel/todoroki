<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.dataset.theme='dark';}catch(e){}</script>
    <link rel="stylesheet" href="styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
	<link rel="icon" type="image/x-icon" href="/images/favicon.svg">
    <title>Todoroki: Todo List</title>
</head>
<body>

<div id="sidebar-backdrop"></div>
<div id="layout">
	<div id="sidebar"></div>

	<div id="main">
		<div id="main-header">
			<button id="sidebar-toggle-btn" title="Toggle menu" aria-label="Toggle sidebar"><span></span></button>
			<div id="project-title-wrap">
				<h2 id="project-title"></h2>
				<span id="project-code-badge" class="project-code-badge" style="display:none" title="Click to edit project code"></span>
			</div>
			<div id="header-actions">
				<button id="add-todo-btn" style="display:none">+ Add Todo to Project</button>
			</div>
		</div>
		<div id="form-container"></div>
		<div id="project-tabs-container"></div>
		<div id="sort-bar-container"></div>
		<div id="selection-bar-container"></div>
		<div id="app"></div>
	</div>
</div>

<button id="fab-btn" title="Quick add to Inbox" aria-label="Add to Inbox">+</button>
</body>
</html>
